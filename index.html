<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TLI Build Vault & Planner</title>
    <link rel="stylesheet" href="assets/style.css">
</head>
<body>
    <header>
        <h1>Torchlight Infinite Build Vault</h1>
        <p>Plan your character here, then sync to GitHub.</p>
    </header>

    <main>
        <div id="admin-panel">
            <h3>Build Planner</h3>
            <input type="password" id="gh-token" placeholder="GitHub Fine-Grained Token">
            
            <div class="form-grid">
                <select id="hero-select" onchange="updateTraits(); updatePreview();">
                    <option value="">Select Hero</option>
                </select>
                
                <select id="trait-select" onchange="updatePreview()">
                    <option value="">Select Trait</option>
                </select>

                <select id="talent-1" onchange="updatePreview()">
                    <option value="">Primary Talent Tree</option>
                </select>

                <input type="text" id="title" placeholder="Build Name (e.g. Frost Boss Killer)" onkeyup="updatePreview()">
                <input type="text" id="b-code" placeholder="Build Code (Optional - get from game later)">
            </div>

            <div id="plan-preview">
                <strong>Current Plan:</strong> <span id="preview-text">Start picking options...</span>
            </div>

            <button id="submit-btn" onclick="submitBuild()">Save Build to Site</button>
        </div>

        <hr>

        <div id="build-container">
            <!-- Builds will be loaded here -->
        </div>
    </main>

    <script src="assets/app.js"></script>
</body>
</html>
