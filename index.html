<!DOCTYPE html>
<html>
<head>
    <link rel="stylesheet" href="assets/style.css">
    <title>TLI Build Vault</title>
</head>
<body>
    <header>
        <h1>Torchlight Infinite Build Vault</h1>
        <input type="text" id="searchInput" placeholder="Search Hero or Skill (e.g. Gemma or Blizzard)..." onkeyup="filterBuilds()">
    </header>

    <!-- Admin Form (Add fields for Skills/Talents here) -->
    <div id="admin-panel">
        <h3>Add New Build</h3>
        <input type="password" id="gh-token" placeholder="GitHub Token">
    
        <!-- Dropdowns instead of typing -->
        <select id="hero-select" onchange="updateTraits()">
            <option value="">Select Hero</option>
        </select>
    
        <select id="trait-select">
            <option value="">Select Trait</option>
        </select>

        <select id="talent-1">
            <option value="">First Talent Tree</option>
        </select>

        <input type="text" id="title" placeholder="Build Title (e.g. Speed Farmer)">
        <input type="text" id="b-code" placeholder="Paste Build Code Here">
    
        <button onclick="submitBuild()">Post to Site</button>
    </div>


    <div id="build-container">
        <!-- Builds will be injected here by app.js -->
    </div>

    <script src="assets/app.js"></script>
</body>
</html>
