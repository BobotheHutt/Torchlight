<!DOCTYPE html>
<html>
<head>
    <link rel="stylesheet" href="assets/style.css">
    <title>TLI Build Vault</title>
</head>
<body>
    <header>
        <h1>Torchlight Infinite Build Vault</h1>
        <input type="text" id="searchInput" placeholder="Search Hero or Skill (e.g. Gemma or Blizzard)..." onkeyup="filterBuilds()">
    </header>

    <!-- Admin Form (Add fields for Skills/Talents here) -->
    <div id="admin-panel" class="hidden">
        <input type="password" id="gh-token" placeholder="GitHub Token">
        <input type="text" id="hero" placeholder="Hero">
        <input type="text" id="title" placeholder="Build Title">
        <input type="text" id="talents" placeholder="Talent Trees">
        <textarea id="skills" placeholder="Main Skills & Links"></textarea>
        <textarea id="gear" placeholder="Key Gear/Stats"></textarea>
        <input type="text" id="b-code" placeholder="Build Code">
        <button onclick="submitBuild()">Publish Build</button>
    </div>

    <div id="build-container">
        <!-- Builds will be injected here by app.js -->
    </div>

    <script src="assets/app.js"></script>
</body>
</html>
